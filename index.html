<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Yumedics · Command Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg: #0A0A0F;
      --bg2: #111118;
      --surface: #16161F;
      --surface2: #1E1E2A;
      --surface3: #252535;
      --border: rgba(255, 255, 255, 0.07);
      --border2: rgba(255, 255, 255, 0.13);
      --ink: #F0EFE8;
      --ink2: #9B9AA8;
      --ink3: #5C5B6E;
      --gold: #D4A843;
      --gold2: #F0C96A;
      --gold-bg: rgba(212, 168, 67, 0.09);
      --green: #22C55E;
      --green-bg: rgba(34, 197, 94, 0.09);
      --yellow: #EAB308;
      --yellow-bg: rgba(234, 179, 8, 0.09);
      --orange: #F97316;
      --orange-bg: rgba(249, 115, 22, 0.09);
      --red: #EF4444;
      --red-bg: rgba(239, 68, 68, 0.09);
      --blue: #6366F1;
      --blue-bg: rgba(99, 102, 241, 0.09);
      --r: 16px;
      --r2: 12px;
      --r3: 8px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: var(--ink);
      overscroll-behavior: none
    }

    input,
    select,
    button,
    textarea {
      font-family: 'Plus Jakarta Sans', sans-serif
    }

    button {
      cursor: pointer
    }

    ::-webkit-scrollbar {
      width: 3px;
      height: 3px
    }

    ::-webkit-scrollbar-track {
      background: transparent
    }

    ::-webkit-scrollbar-thumb {
      background: var(--surface3);
      border-radius: 2px
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      position: relative
    }

    #header {
      background: rgba(10, 10, 15, 0.98);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px 0;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 50
    }

    #top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px
    }

    #logo {
      display: flex;
      align-items: center;
      gap: 10px
    }

    #logo-mark {
      width: 34px;
      height: 34px;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      box-shadow: 0 0 20px rgba(212, 168, 67, 0.25)
    }

    #logo-text .brand {
      font-size: 15px;
      font-weight: 800;
      color: var(--ink);
      letter-spacing: -.2px
    }

    #logo-text .sub {
      font-size: 9px;
      color: var(--ink3);
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 1px
    }

    #header-meta {
      display: flex;
      align-items: center;
      gap: 8px
    }

    .urgent-pill {
      background: var(--red-bg);
      border: 1px solid rgba(239, 68, 68, 0.25);
      color: var(--red);
      font-size: 10px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      display: none;
      animation: pulse-r 2s infinite
    }

    @keyframes pulse-r {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .55
      }
    }

    #date-chip {
      font-size: 10px;
      color: var(--ink3);
      font-family: 'JetBrains Mono', monospace;
      background: var(--surface);
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border)
    }

    #tabs {
      display: flex;
      overflow-x: auto;
      padding-bottom: 0
    }

    #tabs::-webkit-scrollbar {
      display: none
    }

    .tab {
      border: none;
      background: none;
      padding: 10px 13px;
      font-size: 11px;
      font-weight: 700;
      color: var(--ink3);
      border-bottom: 2px solid transparent;
      transition: all .18s;
      white-space: nowrap;
      letter-spacing: .3px;
      text-transform: uppercase
    }

    .tab.active {
      color: var(--gold);
      border-bottom-color: var(--gold)
    }

    .tab-ct {
      margin-left: 4px;
      background: var(--surface2);
      color: var(--ink3);
      border-radius: 10px;
      padding: 1px 6px;
      font-size: 9px;
      font-weight: 700
    }

    .tab.active .tab-ct {
      background: var(--gold-bg);
      color: var(--gold)
    }

    #content {
      flex: 1;
      overflow-y: auto;
      padding: 14px 14px 100px
    }

    #nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: rgba(10, 10, 15, 0.97);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 50;
      padding: 6px 0 calc(6px + env(safe-area-inset-bottom))
    }

    .nb {
      flex: 1;
      border: none;
      background: none;
      padding: 8px 4px 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      font-size: 8px;
      font-weight: 700;
      color: var(--ink3);
      letter-spacing: .5px;
      text-transform: uppercase;
      transition: all .15s
    }

    .nb-icon {
      font-size: 19px;
      line-height: 1;
      transition: transform .2s
    }

    .nb.active {
      color: var(--gold)
    }

    .nb.active .nb-icon {
      transform: translateY(-2px)
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 14px
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r2);
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 4px
    }

    .stat-val {
      font-size: 24px;
      font-weight: 800;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: -1px;
      line-height: 1
    }

    .stat-lbl {
      font-size: 9px;
      color: var(--ink3);
      font-weight: 700;
      letter-spacing: .8px;
      text-transform: uppercase
    }

    .search-wrap {
      position: relative;
      margin-bottom: 10px
    }

    .s-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 13px;
      pointer-events: none;
      opacity: .4
    }

    .search-inp {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r2);
      padding: 11px 12px 11px 38px;
      font-size: 13px;
      color: var(--ink);
      outline: none;
      transition: border-color .15s
    }

    .search-inp::placeholder {
      color: var(--ink3)
    }

    .search-inp:focus {
      border-color: var(--gold)
    }

    .clear-x {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: var(--surface3);
      border: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      font-size: 9px;
      color: var(--ink2);
      display: flex;
      align-items: center;
      justify-content: center
    }

    .chips {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
      overflow-x: auto;
      padding-bottom: 2px
    }

    .chips::-webkit-scrollbar {
      display: none
    }

    .chip {
      border: 1px solid var(--border);
      background: var(--surface);
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 700;
      color: var(--ink3);
      white-space: nowrap;
      letter-spacing: .3px;
      text-transform: uppercase;
      transition: all .15s
    }

    .chip.on {
      border-color: var(--gold);
      background: var(--gold-bg);
      color: var(--gold)
    }

    .pcard {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      margin-bottom: 8px;
      overflow: hidden;
      transition: border-color .2s
    }

    .pcard.open {
      border-color: rgba(212, 168, 67, 0.4)
    }

    .prow {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px;
      cursor: pointer;
      user-select: none
    }

    .pdot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0
    }

    .pinfo {
      flex: 1;
      min-width: 0
    }

    .pname {
      font-size: 13px;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.3;
      margin-bottom: 3px
    }

    .psub {
      font-size: 10px;
      color: var(--ink3);
      font-weight: 500;
      font-family: 'JetBrains Mono', monospace
    }

    .pright {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      flex-shrink: 0
    }

    .ptotal {
      font-size: 24px;
      font-weight: 800;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: -1.5px;
      line-height: 1
    }

    .pbar {
      height: 2px;
      background: var(--surface2)
    }

    .pbar-fill {
      height: 2px;
      transition: width .5s
    }

    .pchev {
      font-size: 9px;
      color: var(--ink3);
      flex-shrink: 0;
      transition: transform .2s
    }

    .pcard.open .pchev {
      transform: rotate(180deg)
    }

    .spill {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 9px;
      font-weight: 800;
      letter-spacing: .5px;
      text-transform: uppercase
    }

    .ok .pdot,
    .ok .pbar-fill {
      background: var(--green)
    }

    .low .pdot,
    .low .pbar-fill {
      background: var(--yellow)
    }

    .crit .pdot,
    .crit .pbar-fill {
      background: var(--orange)
    }

    .out .pdot,
    .out .pbar-fill {
      background: var(--red)
    }

    .ok .ptotal {
      color: var(--ink)
    }

    .low .ptotal {
      color: var(--yellow)
    }

    .crit .ptotal {
      color: var(--orange)
    }

    .out .ptotal {
      color: var(--red)
    }

    .ok .spill {
      background: var(--green-bg);
      color: var(--green)
    }

    .low .spill {
      background: var(--yellow-bg);
      color: var(--yellow)
    }

    .crit .spill {
      background: var(--orange-bg);
      color: var(--orange)
    }

    .out .spill {
      background: var(--red-bg);
      color: var(--red)
    }

    .pexpand {
      padding: 14px;
      border-top: 1px solid var(--border);
      background: var(--bg2)
    }

    .sec-label {
      font-size: 9px;
      font-weight: 800;
      color: var(--ink3);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 8px;
      margin-top: 12px
    }

    .sec-label:first-child {
      margin-top: 0
    }

    .batch-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 4px
    }

    .batch-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r3);
      padding: 10px 12px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 4px;
      align-items: center
    }

    .batch-no {
      font-size: 12px;
      font-weight: 800;
      font-family: 'JetBrains Mono', monospace;
      color: var(--gold)
    }

    .batch-dates {
      font-size: 10px;
      color: var(--ink3);
      margin-top: 2px;
      font-family: 'JetBrains Mono', monospace
    }

    .batch-qty {
      font-size: 18px;
      font-weight: 800;
      font-family: 'JetBrains Mono', monospace;
      color: var(--ink);
      text-align: right
    }

    .batch-qty-lbl {
      font-size: 9px;
      color: var(--ink3);
      text-align: right;
      font-weight: 600
    }

    .no-batch {
      font-size: 12px;
      color: var(--ink3);
      padding: 6px 0;
      font-style: italic
    }

    .loc-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 12px
    }

    .loc-tab {
      padding: 10px 8px;
      border-radius: var(--r2);
      border: 1px solid var(--border);
      background: var(--surface);
      font-weight: 700;
      font-size: 12px;
      color: var(--ink3);
      text-align: center;
      transition: all .15s
    }

    .loc-tab .lc {
      font-size: 18px;
      font-weight: 800;
      font-family: 'JetBrains Mono', monospace;
      display: block;
      color: var(--ink);
      margin-bottom: 2px
    }

    .loc-tab .ln {
      font-size: 10px;
      color: var(--ink3)
    }

    .loc-tab.on {
      border-color: var(--gold);
      background: var(--gold-bg)
    }

    .loc-tab.on .ln {
      color: var(--gold)
    }

    .qty-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px
    }

    .aqb {
      width: 42px;
      height: 42px;
      border-radius: var(--r2);
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: 22px;
      font-weight: 300;
      color: var(--ink2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0
    }

    .aqb:active {
      background: var(--surface3)
    }

    .qty-inp {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r2);
      padding: 10px;
      font-size: 20px;
      font-weight: 800;
      text-align: center;
      color: var(--ink);
      outline: none;
      font-family: 'JetBrains Mono', monospace
    }

    .qty-inp:focus {
      border-color: var(--gold)
    }

    .txt-inp {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r2);
      padding: 10px 13px;
      font-size: 13px;
      color: var(--ink);
      outline: none;
      transition: border-color .15s;
      margin-bottom: 8px
    }

    .txt-inp::placeholder {
      color: var(--ink3)
    }

    .txt-inp:focus {
      border-color: var(--gold)
    }

    .inp-grid2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 8px
    }

    .field-sm label {
      font-size: 9px;
      font-weight: 800;
      color: var(--ink3);
      letter-spacing: .8px;
      text-transform: uppercase;
      display: block;
      margin-bottom: 4px
    }

    .field-sm input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--r3);
      padding: 8px 10px;
      font-size: 13px;
      color: var(--ink);
      outline: none;
      font-family: 'JetBrains Mono', monospace
    }

    .field-sm input:focus {
      border-color: var(--gold)
    }

    .batch-form {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: var(--r2);
      padding: 12px;
      margin-bottom: 8px
    }

    .batch-form-title {
      font-size: 10px;
      font-weight: 800;
      color: var(--gold);
      letter-spacing: .8px;
      text-transform: uppercase;
      margin-bottom: 10px
    }

    .act-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px
    }

    .act-in {
      border: none;
      padding: 13px;
      border-radius: var(--r2);
      font-size: 13px;
      font-weight: 800;
      background: var(--green);
      color: #000;
      transition: opacity .15s
    }

    .act-out {
      border: none;
      padding: 13px;
      border-radius: var(--r2);
      font-size: 13px;
      font-weight: 800;
      background: var(--red);
      color: #fff;
      transition: opacity .15s
    }

    .act-in:active,
    .act-out:active {
      opacity: .75
    }

    .alert-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 14px;
      margin-bottom: 10px
    }

    .alert-card.out {
      border-color: rgba(239, 68, 68, 0.3)
    }

    .alert-card.crit {
      border-color: rgba(249, 115, 22, 0.3)
    }

    .alert-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px
    }

    .alert-name {
      font-weight: 800;
      font-size: 14px;
      color: var(--ink)
    }

    .alert-pack {
      font-size: 11px;
      color: var(--ink3);
      margin-top: 3px;
      font-family: 'JetBrains Mono', monospace
    }

    .alert-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px
    }

    .astat {
      background: var(--surface2);
      border-radius: var(--r2);
      padding: 10px;
      text-align: center
    }

    .astat-n {
      font-size: 20px;
      font-weight: 800;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: -1px
    }

    .astat-l {
      font-size: 8px;
      color: var(--ink3);
      font-weight: 800;
      letter-spacing: .8px;
      text-transform: uppercase;
      margin-top: 4px
    }

    .locs1 {
      background: var(--surface2);
      border-radius: var(--r3);
      padding: 8px 10px;
      font-size: 12px;
      color: var(--ink3);
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px
    }

    .locs1 b {
      color: var(--ink);
      font-family: 'JetBrains Mono', monospace
    }

    .order-warn {
      background: var(--orange-bg);
      border: 1px solid rgba(249, 115, 22, 0.2);
      border-radius: var(--r3);
      padding: 9px 12px;
      font-size: 11px;
      color: var(--orange);
      font-weight: 700
    }

    .sync-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r2);
      padding: 10px 14px;
      margin-bottom: 12px
    }

    .sync-led {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      animation: blink 2.5s infinite;
      flex-shrink: 0
    }

    .sync-led.idle {
      background: var(--ink3);
      animation: none
    }

    .sync-led.syncing {
      background: var(--gold);
      animation: blink .8s infinite
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .2
      }
    }

    .sync-lbl {
      font-size: 12px;
      font-weight: 700;
      color: var(--ink2);
      flex: 1
    }

    .sync-time {
      font-size: 10px;
      color: var(--ink3);
      font-family: 'JetBrains Mono', monospace
    }

    .inv-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      margin-bottom: 10px;
      overflow: hidden
    }

    .inv-hd {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 14px 10px
    }

    .inv-no {
      font-size: 16px;
      font-weight: 800;
      color: var(--ink);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: -.5px
    }

    .inv-dt {
      font-size: 10px;
      color: var(--ink3);
      margin-top: 2px;
      font-family: 'JetBrains Mono', monospace
    }

    .badge-sale {
      background: var(--red-bg);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: var(--red);
      font-size: 9px;
      font-weight: 800;
      padding: 4px 10px;
      border-radius: 20px
    }

    .badge-pur {
      background: var(--green-bg);
      border: 1px solid rgba(34, 197, 94, 0.2);
      color: var(--green);
      font-size: 9px;
      font-weight: 800;
      padding: 4px 10px;
      border-radius: 20px
    }

    .inv-route {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: var(--surface2);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border)
    }

    .inv-party {
      font-size: 12px;
      font-weight: 700;
      color: var(--ink)
    }

    .inv-party-tag {
      font-size: 9px;
      color: var(--ink3);
      margin-top: 1px;
      font-weight: 600;

      { id: 23, name: "SCALP DOSE SHAMPOO", pack: "150ML", stock: 2944, r: 1200, batches: [] },
      { id: 24, name: "PROLITE FACE WASH", pack: "25GM", stock: 3533, r: 2000, batches: [] },
      { id: 25, name: "CERAMED HYDRA FACE WASH", pack: "25GM", stock: 1811, r: 2000, batches: [] },
      { id: 26, name: "CERAMED HYDRA BLUE SUNSCREEN", pack: "25GM", stock: 3230, r: 2000, batches: [] },
      { id: 27, name: "PROLITE TABLET", pack: "—", stock: 2086, r: 300, batches: [] },
      { id: 28, name: "HAIRMEDICS BIOTIN KERATIN 60 TAB", pack: "60 TAB", stock: 175, r: 400, batches: [{ batch_no: "DT1456", mfg: "02/2026", exp: "07/2027", qty: 175 }] },
      { id: 29, name: "GA PRIME OVERNIGHT MASK", pack: "—", stock: 169, r: 700, batches: [] },
      { id: 30, name: "BIOSITOL POWDER", pack: "—", stock: 301, r: 500, batches: [] },
      { id: 31, name: "HAIRMEDICS BIOTIN 30 TAB", pack: "MRP 660", stock: 1056, r: 1000, batches: [] },
    ];

    // ══════════════════════════════════════════
    //  STATE
    // ══════════════════════════════════════════
    const SK = 'ymd_v7_final', IK = 'ymd_inv_v4', LK = 'ymd_log_v1';
    const loadS = () => { try { const r = localStorage.getItem(SK); if (r) return JSON.parse(r); } catch (e) { } return { products: JSON.parse(JSON.stringify(DEFAULTS)), log: [] }; };
    const saveS = () => localStorage.setItem(SK, JSON.stringify(S));
    const loadI = () => { try { const r = localStorage.getItem(IK); if (r) return JSON.parse(r); } catch (e) { } return []; };
    const saveI = () => localStorage.setItem(IK, JSON.stringify(INV));

    let S = loadS(), INV = loadI();
    S.products.forEach(p => { if (!p.batches) p.batches = []; if (p.b !== undefined && p.m !== undefined) { p.stock = (p.b || 0) + (p.m || 0); delete p.b; delete p.m; } });

    let tab = 'stock', expId = null, qLoc = 'b', srch = '', filt = 'all', editRL = null, lastSync = null, syncing = false, openInvIdx = null, invSrch = '';

    // ══════════════════════════════════════════
    //  SUPABASE SYNC & SEEDING
    // ══════════════════════════════════════════
    async function syncFromSupabase() {
      if (syncing) return;
      syncing = true;
      updateSyncBar('syncing');
      toast('Syncing with Supabase…', 'info');

      try {
        // 1. Fetch Products
        const { data: pData, error: pErr } = await supabase.from('products').select('*');
        if (pErr) throw pErr;

        if (!pData || pData.length === 0) {
          // AUTO-SEED if database is empty
          toast('Database empty, seeding defaults…', 'info');
          const seedData = DEFAULTS.map(p => ({
            id: p.id,
            name: p.name,
            pack: p.pack,
            stock: p.stock,
            reorder_level: p.r,
            batches: p.batches
          }));
          const { error: sErr } = await supabase.from('products').insert(seedData);
          if (sErr) throw sErr;
          S.products = JSON.parse(JSON.stringify(DEFAULTS));
        } else {
          // Map Supabase 'reorder_level' back to local 'r'
          S.products = pData.map(p => ({
            ...p,
            r: p.reorder_level !== undefined ? p.reorder_level : (p.r || 30)
          })).sort((a, b) => a.id - b.id);
        }
        saveS();

        // 2. Fetch Invoices
        const { data: iData, error: iErr } = await supabase.from('invoices').select('*').order('id', { ascending: false }).limit(100);
        if (iErr) throw iErr;
        if (iData) {
          // Map Supabase names to local names
          INV = iData.map(inv => ({
            ...inv,
            from: inv.from_party,
            to: inv.to_party
          }));
          saveI();
        }

        // 3. Fetch Logs
        const { data: lData, error: lErr } = await supabase.from('logs').select('*').order('timestamp', { ascending: false }).limit(200);
        if (lErr) throw lErr;
        if (lData) {
          S.log = lData.map(l => ({
            id: l.id,
            pid: l.pid,
            product: l.product,
            change: l.change,
            newQty: l.new_qty,
            note: l.note,
            ts: new Date(l.timestamp).getTime(),
            auto: l.is_auto
          }));
          saveS();
        }

        lastSync = new Date();
        updateSyncBar('live');
        toast(`✅ Synced with Cloud`);
        render();

      } catch (err) {
        console.error('Supabase Sync error:', err);
        updateSyncBar('idle');
        toast('Sync failed — using local data', 'warn');
      } finally {
        syncing = false;
      }

      const led = document.getElementById('sync-led');
      const lbl = document.getElementById('sync-lbl');

      lbl.textContent = state === 'syncing' ? 'Syncing…' : state === 'live' ? 'Live — Supabase' : 'Offline Mode';

    // Auto-sync every 2 minutes

    // ══════════════════════════════════════════
    //  PROCESS INVOICE (auto-apply)
    // ══════════════════════════════════════════
    async function applyInvoiceToStock(inv) {
      const isSale = inv.transaction_type === 'SALE';
      const products = inv.products || [];

      for (const item of products) {
        const n = (item.name || "").toUpperCase().replace(/\(N\)|\(NEW\)/gi, '').trim();
        const sz = (item.size || "").toUpperCase().trim();
        let p = S.products.find(x => x.name.includes(n) && x.pack.toUpperCase().includes(sz));
        if (!p) p = S.products.find(x => x.name.includes(n));

        if (p) {
          const delta = isSale ? -item.quantity : item.quantity;
          p.stock = Math.max(0, (p.stock || 0) + delta);

          if (!p.batches) p.batches = [];
          if (!isSale && item.batch_no) {
            const ex = p.batches.find(b => b.batch_no === item.batch_no);
            if (ex) ex.qty = (ex.qty || 0) + item.quantity;
            else p.batches.push({ batch_no: item.batch_no, mfg: item.mfg_date || '', exp: item.exp_date || '', qty: item.quantity });
          } else if (isSale) {
            let rem = item.quantity;
            p.batches.sort((a, b) => { const da = parseExp(a.exp), db = parseExp(b.exp); if (!da && !db) return 0; if (!da) return 1; if (!db) return -1; return da - db; });
            p.batches.forEach(b => { if (rem <= 0) return; const d = Math.min(b.qty || 0, rem); b.qty = (b.qty || 0) - d; rem -= d; });
            p.batches = p.batches.filter(b => (b.qty || 0) > 0);
          }

          // Update Supabase Product
          await supabase.from('products').update({ stock: p.stock, batches: p.batches }).eq('id', p.id);

          // Log it in Supabase
          const logEntry = {
            pid: p.id,
            product: p.name + (p.pack !== '—' ? ` · ${p.pack}` : ''),
            change: (delta > 0 ? '+' : '') + delta,
            new_qty: p.stock,
            note: `📄 ${inv.invoice_no} · ${isSale ? inv.to : inv.from}`,
            is_auto: true
          };
          await supabase.from('logs').insert(logEntry);
        }
      }
    }

    // ══════════════════════════════════════════
    //  HELPERS
    // ══════════════════════════════════════════
    const status = (t, r) => t === 0 ? 'out' : t <= r * .5 ? 'crit' : t <= r ? 'low' : 'ok';
    const sLabel = s => ({ ok: 'OK', low: 'LOW', crit: 'CRITICAL', out: 'OUT OF STOCK' })[s];
    const sColor = s => ({ ok: 'var(--green)', low: 'var(--yellow)', crit: 'var(--orange)', out: 'var(--red)' })[s];
    const pct = (t, r) => Math.min(100, Math.round(t / Math.max(r * 1.5, 1) * 100));
    const enrich = p => { const t = p.stock || 0; const st = status(t, p.r); return { ...p, total: t, st, pct: pct(t, p.r) }; };
    const fmt = n => Number(n || 0).toLocaleString('en-IN');
    const fmtDt = ts => { if (!ts) return '—'; return new Date(ts).toLocaleString('en-IN', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' }); };
    function parseExp(s) { if (!s) return null; const p = s.split('/'); if (p.length === 2) return new Date(parseInt(p[1]), parseInt(p[0]) - 1, 1); return null; }
    function daysLeft(s) { const d = parseExp(s); if (!d) return null; return Math.round((d - new Date()) / 864e5); }

    let _tt;
    function toast(msg, type = 'ok') {
      const el = document.getElementById('toast');
      el.textContent = (type === 'error' ? '🚨 ' : type === 'warn' ? '⚠️ ' : type === 'info' ? '🔄 ' : '✅ ') + msg;
      el.classList.add('show'); clearTimeout(_tt);
      _tt = setTimeout(() => el.classList.remove('show'), 3000);
    }

    function switchTab(t) {
      tab = t;
      document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.dataset.tab === t));
      document.querySelectorAll('.nb').forEach(b => b.classList.toggle('active', b.dataset.tab === t));
      document.getElementById('fab').style.display = t === 'stock' ? 'flex' : 'none';
      render();
    }

    async function doUpdate(id, type) {
      const qty = parseInt(document.getElementById('qty-inp-' + id)?.value);
      const note = document.getElementById('note-inp-' + id)?.value.trim();
      const party = document.getElementById('party-inp-' + id)?.value.trim();
      const batchNo = document.getElementById('batch-no-inp-' + id)?.value.trim();
      const mfgDate = document.getElementById('mfg-inp-' + id)?.value.trim();
      const expDate = document.getElementById('exp-inp-' + id)?.value.trim();
      if (!qty || qty <= 0) { toast('Enter a valid quantity', 'error'); return; }
      const p = S.products.find(x => x.id === id); if (!p) return;
      if (!p.batches) p.batches = [];
      const delta = type === 'in' ? qty : -qty;
      p.stock = Math.max(0, (p.stock || 0) + delta);
      if (type === 'in' && batchNo) { const ex = p.batches.find(b => b.batch_no === batchNo); if (ex) { ex.qty = (ex.qty || 0) + qty; } else { p.batches.push({ batch_no: batchNo, mfg: mfgDate || '', exp: expDate || '', qty }); } }
      else if (type === 'out') { let rem = qty; p.batches.sort((a, b) => { const da = parseExp(a.exp), db = parseExp(b.exp); if (!da && !db) return 0; if (!da) return 1; if (!db) return -1; return da - db; }); p.batches.forEach(b => { if (rem <= 0) return; const d = Math.min(b.qty || 0, rem); b.qty = (b.qty || 0) - d; rem -= d; }); p.batches = p.batches.filter(b => (b.qty || 0) > 0); }

      const logEntry = {
        pid: id,
        product: p.name + (p.pack !== '—' ? ` · ${p.pack}` : ''),
        change: (delta > 0 ? '+' : '') + delta,
        new_qty: p.stock,
        note: (party ? `${type === 'in' ? 'From' : 'To'}: ${party} · ` : '') + (note || (type === 'in' ? 'Stock in' : 'Stock out')) + (batchNo ? ` · Batch ${batchNo}` : ''),
        is_auto: false
      };

      try {
        // 1. Update Supabase Product
        await supabase.from('products').update({ stock: p.stock, batches: p.batches }).eq('id', id);
        // 2. Log it
        await supabase.from('logs').insert(logEntry);

        toast(`${p.name}: ${fmt(p.stock)} units`);
        saveS(); expId = null; render();
      } catch (err) {
        console.error('Error updating stock:', err);
        toast('Error saving to cloud', 'error');
      }
    }

    async function saveRL(id) {
      const v = parseInt(document.getElementById('rl-inp-' + id)?.value);
      if (isNaN(v) || v < 0) { toast('Invalid', 'error'); return; }
      try {
        await supabase.from('products').update({ reorder_level: v }).eq('id', id);
        S.products.find(x => x.id === id).r = v;
        saveS(); editRL = null; toast('Saved'); render();
      } catch (e) {
        toast('Error saving reorder level', 'error');
      }
    }

    function openMo() { document.getElementById('modal-overlay').classList.add('open'); }
    function closeMo() { document.getElementById('modal-overlay').classList.remove('open');['m-name', 'm-pack', 'm-b', 'm-r'].forEach(i => document.getElementById(i).value = ''); }
    function closeMoBg(e) { if (e.target === document.getElementById('modal-overlay')) closeMo(); }
    async function saveNewProd() {
      const name = document.getElementById('m-name').value.trim().toUpperCase();
      if (!name) { toast('Name required', 'error'); return; }
      const maxId = S.products.reduce((a, p) => Math.max(a, p.id), 0);
      const newP = {
        id: maxId + 1,
        name,
        pack: document.getElementById('m-pack').value.trim() || '—',
        stock: parseInt(document.getElementById('m-b').value) || 0,
        reorder_level: parseInt(document.getElementById('m-r').value) || 300,
        batches: []
      };

      try {
        const { error } = await supabase.from('products').insert(newP);
        if (error) throw error;

        // Update local state with same data (mapping reorder_level -> r)
        S.products.push({ ...newP, r: newP.reorder_level });
        saveS(); closeMo(); toast('Product added'); render();
      } catch (e) {
        console.error('Error adding product:', e);
        toast('Error adding to cloud', 'error');
      }
    }

    function updateHeader() {
      const en = S.products.map(enrich);
      const urg = en.filter(p => p.st === 'out' || p.st === 'crit');
      const al = en.filter(p => p.st !== 'ok');
      const up = document.getElementById('urgent-pill');
      if (urg.length) { up.textContent = `🔴 ${urg.length} URGENT`; up.style.display = 'inline'; } else up.style.display = 'none';
      document.getElementById('tc-al').textContent = al.length;
      document.getElementById('tc-inv').textContent = INV.length;
      document.getElementById('date-chip').textContent = new Date().toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
    }

    function render() {
      updateHeader();
      const el = document.getElementById('content');
      if (tab === 'stock') el.innerHTML = renderStock();
      if (tab === 'alerts') el.innerHTML = renderAlerts();
      if (tab === 'invoices') el.innerHTML = renderInvoices();
      if (tab === 'log') el.innerHTML = renderLog();
      if (tab === 'settings') el.innerHTML = renderSettings();
    }

    function renderSyncBar() {
      return `<div class="sync-bar">
    <div class="sync-led ${lastSync ? '' : 'idle'}" id="sync-led"></div>
    <div class="sync-lbl" id="sync-lbl">${lastSync ? 'Live — Google Sheets' : 'Local data (tap to sync)'}</div>
    <div class="sync-time" id="sync-time">${lastSync ? fmtDt(lastSync) : 'Never'}</div>
    <button onclick="syncFromSheet()" style="border:none;background:var(--gold-bg);color:var(--gold);border-radius:8px;padding:4px 10px;font-size:10px;font-weight:800;margin-left:4px">SYNC</button>
  </div>`;
    }

    function renderStock() {
      const en = S.products.map(enrich);
      let list = en;
      if (filt !== 'all') list = list.filter(p => p.st === filt);
      if (srch.trim()) { const q = srch.toLowerCase(); list = list.filter(p => p.name.toLowerCase().includes(q) || p.pack.toLowerCase().includes(q)); }
      const ok = en.filter(p => p.st === 'ok').length, low = en.filter(p => p.st === 'low').length, urg = en.filter(p => p.st === 'crit' || p.st === 'out').length;

      let cards = '';
      list.forEach(p => {
        const isOpen = expId === p.id;
        let exp = '';
        if (isOpen) {
          const batches = p.batches || [];
          let bHTML = batches.length === 0 ? `<div class="no-batch">No batch data yet.</div>` :
            [...batches].sort((a, b) => { const da = parseExp(a.exp), db = parseExp(b.exp); if (!da && !db) return 0; if (!da) return 1; if (!db) return -1; return da - db; })
              .map(b => {
                const d = daysLeft(b.exp);
                const rc = d !== null && d < 0 ? 'expired' : d !== null && d <= 90 ? 'expiring' : '';
                return `<div class="batch-row ${rc}">
            <div><div class="batch-no">${b.batch_no}</div>
            <div class="batch-dates">MFG: ${b.mfg || '—'} · EXP: ${b.exp || '—'}</div></div>
            <div><div class="batch-qty">${fmt(b.qty)}</div><div class="batch-qty-lbl">UNITS</div></div>
          </div>`;
              }).join('');
          exp = `<div class="pexpand fade-up">
        <div class="sec-label">📦 Batch Stock</div>
        <div class="batch-list">${bHTML}</div>
        <div class="sec-label">🏷️ Stock In — Batch Details</div>
        <div class="batch-form">
          <div class="batch-form-title">New Batch</div>
          <div class="inp-grid2">
            <div class="field-sm"><label>Batch No.</label><input id="batch-no-inp-${p.id}" placeholder="e.g. AL0663"/></div>
            <div class="field-sm"><label>Qty</label><input id="qty-inp-${p.id}" type="number" min="1" placeholder="0" style="padding:8px;font-size:14px"/></div>
          </div>
          <div class="inp-grid2" style="margin-top:8px">
            <div class="field-sm"><label>Mfg Date</label><input id="mfg-inp-${p.id}" placeholder="MM/YYYY"/></div>
            <div class="field-sm"><label>Exp Date</label><input id="exp-inp-${p.id}" placeholder="MM/YYYY"/></div>
          </div>
        </div>
        <div class="sec-label">🏢 Party</div>
        <input class="txt-inp" id="party-inp-${p.id}" placeholder="Distributor / Chemist name"/>
        <input class="txt-inp" id="note-inp-${p.id}" placeholder="Note (optional)"/>
        <div class="act-row">
          <button class="act-in" onclick="doUpdate(${p.id},'in')">📥 Stock In</button>
          <button class="act-out" onclick="doUpdate(${p.id},'out')">📤 Dispatch</button>
        </div>
      </div>`;
        }
        const fb = (p.batches || [])[0];
        const bprev = fb ? ` · 🏷️ ${fb.batch_no}` : '';
        cards += `<div class="pcard ${p.st} ${isOpen ? 'open' : ''}">
      <div class="prow" onclick="toggleExp(${p.id})">
        <div class="pdot"></div>
        <div class="pinfo">
          <div class="pname">${p.name}</div>
          <div class="psub">${p.pack !== '—' ? p.pack + ' · ' : ''}${fmt(p.stock)} units${bprev}</div>
        </div>
        <div class="pright">
          <div class="ptotal">${fmt(p.total)}</div>
          <span class="spill">${sLabel(p.st)}</span>
        </div>
        <div class="pchev">▾</div>
      </div>
      <div class="pbar"><div class="pbar-fill" style="width:${p.pct}%;background:${sColor(p.st)}"></div></div>
      ${exp}
    </div>`;
      });

      const chips = ['all', 'out', 'crit', 'low', 'ok'].map(k => `<button class="chip ${filt === k ? 'on' : ''}" onclick="setFilt('${k}')">${{ all: 'All', out: 'Out', crit: 'Critical', low: 'Low', ok: 'Healthy' }[k]}</button>`).join('');
      return `${renderSyncBar()}
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <div style="font-size:11px;font-weight:800;color:var(--ink3);letter-spacing:1px;text-transform:uppercase">Quick Stats</div>
    <button onclick="exportToExcel()" style="background:var(--green-bg);color:var(--green);border:1px solid rgba(34,197,94,0.2);padding:5px 12px;border-radius:20px;font-size:9px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;display:flex;align-items:center;gap:5px">📥 Export Excel</button>
  </div>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-val" style="color:var(--green)">${ok}</div><div class="stat-lbl">Healthy</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--yellow)">${low}</div><div class="stat-lbl">Low</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--red)">${urg}</div><div class="stat-lbl">Urgent</div></div>
  </div>
  <div class="search-wrap">
    <span class="s-icon">🔍</span>
    <input class="search-inp" placeholder="Search product…" value="${srch.replace(/"/g, '&quot;')}" oninput="setSrch(this.value)"/>
    ${srch ? `<button class="clear-x" onclick="setSrch('')">✕</button>` : ''}
  </div>
  <div class="chips">${chips}</div>
  ${cards || `<div class="empty"><div class="ei">🔍</div><div class="et">Nothing found</div></div>`}`;
    }

    function renderAlerts() {
      const alerts = S.products.map(enrich).filter(p => p.st !== 'ok').sort((a, b) => ({ out: 0, crit: 1, low: 2 }[a.st] - { out: 0, crit: 1, low: 2 }[b.st] || a.total - b.total));
      if (!alerts.length) return `<div class="empty"><div class="ei">🎉</div><div class="et">All Stock Healthy</div><div class="es">No reordering needed right now.</div></div>`;
      let h = `<div style="font-size:11px;color:var(--ink3);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:12px">${alerts.length} products need attention · Lead time ~1.5 months</div>`;
      alerts.forEach(p => {
        const def = Math.max(0, p.r - p.total);
        h += `<div class="alert-card ${p.st}">
      <div class="alert-top">
        <div><div class="alert-name">${p.name}</div>${p.pack !== '—' ? `<div class="alert-pack">${p.pack}</div>` : ''}</div>
        <span class="spill ${p.st}">${sLabel(p.st)}</span>
      </div>
      <div class="alert-3">
        <div class="astat"><div class="astat-n" style="color:${sColor(p.st)}">${fmt(p.total)}</div><div class="astat-l">Current</div></div>
        <div class="astat"><div class="astat-n" style="color:var(--ink3)">${fmt(p.r)}</div><div class="astat-l">Reorder at</div></div>
        <div class="astat"><div class="astat-n" style="color:${def > 0 ? 'var(--red)' : 'var(--green)'}">${fmt(def)}</div><div class="astat-l">Shortfall</div></div>
      </div>
      <div class="locs1"><span>📦 Total Stock</span><b>${fmt(p.total)} units</b></div>
      ${(p.batches || []).length ? `<div style="font-size:10px;color:var(--gold);margin-bottom:6px;font-family:'JetBrains Mono',monospace">🏷️ ${p.batches.map(b => b.batch_no).join(' · ')}</div>` : ''}
      ${def > 0 ? `<div class="order-warn">⚠️ Order ${fmt(def)} units — 1.5 month lead time</div>` : ''}
    </div>`;
      });
      return h;
    }

    function renderInvoices() {
      if (!INV.length) return `<div class="empty"><div class="ei">📄</div><div class="et">No Dispatches Yet</div><div class="es">Invoices sync automatically from Gmail every 15 minutes.</div><button class="refresh-btn" onclick="syncFromSheet()">🔄 Sync Now</button></div>`;

      // Filter invoices by search query
      let filtered = INV;
      if (invSrch.trim()) {
        const q = invSrch.toLowerCase();
        filtered = INV.filter(inv =>
          (inv.invoice_no || '').toLowerCase().includes(q) ||
          (inv.from || '').toLowerCase().includes(q) ||
          (inv.to || '').toLowerCase().includes(q) ||
          (inv.invoice_date || '').toLowerCase().includes(q)
        );
      }

      let h = renderSyncBar();

      // Search bar at top
      h += `<div class="search-wrap" style="margin-bottom:12px">
    <span class="s-icon">🔍</span>
    <input class="search-inp" placeholder="Search invoice number, party, or date…" value="${invSrch.replace(/"/g, '&quot;')}" oninput="setInvSrch(this.value)"/>
    ${invSrch ? `<button class="clear-x" onclick="setInvSrch('')">✕</button>` : ''}
  </div>`;

      // Result count
      h += `<div style="font-size:11px;color:var(--ink3);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:12px">${filtered.length} of ${INV.length} invoice${INV.length !== 1 ? 's' : ''} · Tap to view details</div>`;

      // No results
      if (filtered.length === 0) {
        h += `<div class="empty"><div class="ei">🔍</div><div class="et">No invoices found</div><div class="es">Try a different search term</div></div>`;
        return h;
      }

      // Render each invoice card
      filtered.forEach((inv, idx) => {
        const sale = inv.transaction_type === 'SALE';
        const isOpen = openInvIdx === idx;
        const party = sale ? (inv.to || '—') : (inv.from || '—');

        h += `<div class="inv-card" style="${isOpen ? 'border-color:rgba(212,168,67,0.4)' : ''}">
      <div class="inv-hd" style="cursor:pointer;user-select:none" onclick="toggleInv(${idx})">
        <div style="display:flex;align-items:center;gap:10px;flex:1;min-width:0">
          <span style="font-size:16px">📄</span>
          <div style="flex:1;min-width:0">
            <div class="inv-no">${inv.invoice_no}</div>
            <div class="inv-dt">${inv.invoice_date} · ${party}</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
          <span class="${sale ? 'badge-sale' : 'badge-pur'}">${inv.transaction_type}</span>
          <span style="font-size:10px;color:var(--ink3);transition:transform .2s;display:inline-block;transform:${isOpen ? 'rotate(180deg)' : 'rotate(0deg)'}">▼</span>
        </div>
      </div>
      ${isOpen ? `
      <div class="inv-route">
        <div><div class="inv-party">${inv.from || '—'}</div><div class="inv-party-tag">FROM</div></div>
        <div class="inv-arrow">———▶</div>
        <div style="text-align:right"><div class="inv-party">${inv.to || '—'}</div><div class="inv-party-tag" style="text-align:right">TO</div></div>
      </div>
      <div class="inv-lines">
        ${(inv.products || []).map(p => `<div class="inv-line">
          <div><div class="inv-ln">${p.name}</div><div class="inv-lm">${p.size || ''}</div></div>
          <div class="inv-lr">
            <div class="inv-qty ${sale ? 'qty-out' : 'qty-in'}">${sale ? '−' : '+'}${p.quantity}</div>
            <div class="inv-batch">🏷️ ${p.batch_no || '—'}</div>
          </div>
        </div>`).join('')}
      </div>
      ` : ''}
    </div>`;
      });

      return h;
    }

    function renderLog() {
      if (!S.log.length) return `<div class="empty"><div class="ei">📋</div><div class="et">No Activity</div><div class="es">All stock movements will appear here.</div></div>`;
      let h = `<div style="font-size:11px;color:var(--ink3);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:12px">${S.log.length} movements</div>`;
      S.log.slice(0, 100).forEach(e => { const isIn = e.change.startsWith('+'); h += `<div class="log-item"><div class="log-ic ${e.auto ? 'auto' : isIn ? 'in' : 'out'}">${e.auto ? '🤖' : isIn ? '📥' : '📤'}</div><div class="log-body"><div class="log-prod">${e.product}</div><div class="log-meta">${fmtDt(e.ts)} · ${e.note || ''}</div></div><div class="log-right"><div class="log-delta" style="color:${isIn ? 'var(--green)' : 'var(--red)'}">${e.change}</div><div class="log-stock">→ ${fmt(e.newQty)}</div></div></div>`; });
      return h;
    }

    function renderSettings() {
      const en = S.products.map(enrich);
      let h = `<div class="settings-note">⏱️ Lead time: 1.5 months. Reorder = 1.5 months sales + buffer.</div>`;
      en.forEach(p => { const isEd = editRL === p.id; h += `<div class="rl-row"><div class="rl-dot" style="background:${sColor(p.st)}"></div><div class="rl-body"><div class="rl-name">${p.name}${p.pack !== '—' ? ` (${p.pack})` : ''}</div><div class="rl-meta">Stock: ${fmt(p.total)} · Reorder: ${fmt(p.r)} · Batches: ${(p.batches || []).length}</div></div>${isEd ? `<div class="rl-edit-row"><input class="rl-inp" id="rl-inp-${p.id}" type="number" value="${p.r}" min="0"/><button class="rl-save" onclick="saveRL(${p.id})">Save</button><button class="rl-cancel" onclick="cancelRL()">✕</button></div>` : `<button class="rl-edit-btn" onclick="startRL(${p.id})">Edit</button>`}</div>`; });
      return h;
    }

    function toggleExp(id) { expId = expId === id ? null : id; render(); }
    function toggleInv(idx) { openInvIdx = openInvIdx === idx ? null : idx; render(); }
    function setInvSrch(v) { invSrch = v; openInvIdx = null; render(); }
    function setSrch(v) { srch = v; render(); }
    function setFilt(v) { filt = v; render(); }
    function startRL(id) { editRL = id; render(); setTimeout(() => { const el = document.getElementById('rl-inp-' + id); if (el) { el.focus(); el.select(); } }, 50); }
    function cancelRL() { editRL = null; render(); }

    function exportToExcel() {
      toast('Generating Excel…', 'info');
      try {
        const data = S.products.map(p => {
          const e = enrich(p);
          return {
            'Product Name': p.name,
            'Packing': p.pack,
            'Current Stock': p.stock,
            'Reorder Level': p.r,
            'Status': sLabel(e.st),
            'Shortfall': Math.max(0, p.r - p.stock)
          };
        });

        const worksheet = XLSX.utils.json_to_sheet(data);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "Inventory");

        // Style the header (Note: Basic XLSX doesn't support complex styling without extra libs, but we can name columns well)
        const dateStr = new Date().toISOString().split('T')[0];
        XLSX.writeFile(workbook, `Yumedics_Inventory_${dateStr}.xlsx`);
        toast('Excel downloaded!');
      } catch (e) {
        console.error('Export error:', e);
        toast('Export failed', 'error');
      }
    }

    // Boot — render then sync
    switchTab('stock');
    setTimeout(syncFromSupabase, 500);
  </script>

</body>
