<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Yumedics · Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#0A0A0F;--bg2:#111118;--surface:#16161F;--surface2:#1E1E2A;--surface3:#252535;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --ink:#F0EFE8;--ink2:#9B9AA8;--ink3:#5C5B6E;
  --gold:#D4A843;--gold2:#F0C96A;--gold-bg:rgba(212,168,67,0.09);
  --green:#22C55E;--green-bg:rgba(34,197,94,0.09);
  --yellow:#EAB308;--yellow-bg:rgba(234,179,8,0.09);
  --orange:#F97316;--orange-bg:rgba(249,115,22,0.09);
  --red:#EF4444;--red-bg:rgba(239,68,68,0.09);
  --blue:#6366F1;--blue-bg:rgba(99,102,241,0.09);
  --r:16px;--r2:12px;--r3:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);font-family:'Plus Jakarta Sans',sans-serif;color:var(--ink);overscroll-behavior:none}
input,select,button,textarea{font-family:'Plus Jakarta Sans',sans-serif}
button{cursor:pointer}
button:disabled{opacity:.5;cursor:not-allowed}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px}

#app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;position:relative}
#header{background:rgba(10,10,15,0.98);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:14px 16px 0;flex-shrink:0;position:sticky;top:0;z-index:50}
#top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
#logo{display:flex;align-items:center;gap:10px}
#logo-mark{width:34px;height:34px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;box-shadow:0 0 20px rgba(212,168,67,0.25)}
#logo-text .brand{font-size:15px;font-weight:800;color:var(--ink);letter-spacing:-.2px}
#logo-text .sub{font-size:9px;color:var(--ink3);font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-top:1px}
#header-meta{display:flex;align-items:center;gap:8px}
.urgent-pill{background:var(--red-bg);border:1px solid rgba(239,68,68,0.25);color:var(--red);font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;display:none;animation:pulse-r 2s infinite}
@keyframes pulse-r{0%,100%{opacity:1}50%{opacity:.55}}
#date-chip{font-size:10px;color:var(--ink3);font-family:'JetBrains Mono',monospace;background:var(--surface);padding:4px 10px;border-radius:20px;border:1px solid var(--border)}
#export-btn{background:linear-gradient(135deg,var(--green),#16a34a);color:#fff;border:none;border-radius:20px;padding:5px 11px;font-size:10px;font-weight:800;letter-spacing:.5px;display:flex;align-items:center;gap:4px;transition:transform .15s,box-shadow .15s}
#export-btn:active{transform:scale(.92)}
#export-btn:hover{box-shadow:0 2px 12px rgba(34,197,94,0.35)}
#export-btn.busy{background:var(--surface2);color:var(--ink3)}

#tabs{display:flex;overflow-x:auto;padding-bottom:0}
#tabs::-webkit-scrollbar{display:none}
.tab{border:none;background:none;padding:10px 13px;font-size:11px;font-weight:700;color:var(--ink3);border-bottom:2px solid transparent;transition:all .18s;white-space:nowrap;letter-spacing:.3px;text-transform:uppercase}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab-ct{margin-left:4px;background:var(--surface2);color:var(--ink3);border-radius:10px;padding:1px 6px;font-size:9px;font-weight:700}
.tab.active .tab-ct{background:var(--gold-bg);color:var(--gold)}

#content{flex:1;overflow-y:auto;padding:14px 14px 100px}
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(10,10,15,0.97);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;z-index:50;padding:6px 0 calc(6px + env(safe-area-inset-bottom))}
.nb{flex:1;border:none;background:none;padding:8px 4px 6px;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:8px;font-weight:700;color:var(--ink3);letter-spacing:.5px;text-transform:uppercase;transition:all .15s}
.nb-icon{font-size:19px;line-height:1;transition:transform .2s}
.nb.active{color:var(--gold)}
.nb.active .nb-icon{transform:translateY(-2px)}

.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:12px;display:flex;flex-direction:column;gap:4px}
.stat-val{font-size:24px;font-weight:800;font-family:'JetBrains Mono',monospace;letter-spacing:-1px;line-height:1}
.stat-lbl{font-size:9px;color:var(--ink3);font-weight:700;letter-spacing:.8px;text-transform:uppercase}

.search-wrap{position:relative;margin-bottom:10px}
.s-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none;opacity:.4}
.search-inp{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:11px 12px 11px 38px;font-size:13px;color:var(--ink);outline:none;transition:border-color .15s}
.search-inp::placeholder{color:var(--ink3)}
.search-inp:focus{border-color:var(--gold)}
.clear-x{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:var(--surface3);border:none;width:20px;height:20px;border-radius:50%;font-size:9px;color:var(--ink2);display:flex;align-items:center;justify-content:center}

.chips{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px}
.chips::-webkit-scrollbar{display:none}
.chip{border:1px solid var(--border);background:var(--surface);padding:5px 12px;border-radius:20px;font-size:10px;font-weight:700;color:var(--ink3);white-space:nowrap;letter-spacing:.3px;text-transform:uppercase;transition:all .15s}
.chip.on{border-color:var(--gold);background:var(--gold-bg);color:var(--gold)}

.pcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden;transition:border-color .2s}
.pcard.open{border-color:rgba(212,168,67,0.4)}
.prow{display:flex;align-items:center;gap:10px;padding:14px;cursor:pointer;user-select:none}
.pdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pinfo{flex:1;min-width:0}
.pname{font-size:13px;font-weight:700;color:var(--ink);line-height:1.3;margin-bottom:3px}
.psub{font-size:10px;color:var(--ink3);font-weight:500;font-family:'JetBrains Mono',monospace}
.pright{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.ptotal{font-size:24px;font-weight:800;font-family:'JetBrains Mono',monospace;letter-spacing:-1.5px;line-height:1}
.pbar{height:2px;background:var(--surface2)}
.pbar-fill{height:2px;transition:width .5s}
.pchev{font-size:9px;color:var(--ink3);flex-shrink:0;transition:transform .2s}
.pcard.open .pchev{transform:rotate(180deg)}
.spill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:9px;font-weight:800;letter-spacing:.5px;text-transform:uppercase}
.ok  .pdot,.ok  .pbar-fill{background:var(--green)}
.low .pdot,.low .pbar-fill{background:var(--yellow)}
.crit .pdot,.crit .pbar-fill{background:var(--orange)}
.out .pdot,.out .pbar-fill{background:var(--red)}
.ok  .ptotal{color:var(--ink)}
.low .ptotal{color:var(--yellow)}
.crit .ptotal{color:var(--orange)}
.out .ptotal{color:var(--red)}
.ok  .spill{background:var(--green-bg);color:var(--green)}
.low .spill{background:var(--yellow-bg);color:var(--yellow)}
.crit .spill{background:var(--orange-bg);color:var(--orange)}
.out .spill{background:var(--red-bg);color:var(--red)}

.pexpand{padding:14px;border-top:1px solid var(--border);background:var(--bg2)}
.sec-label{font-size:9px;font-weight:800;color:var(--ink3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;margin-top:12px}
.sec-label:first-child{margin-top:0}
.batch-list{display:flex;flex-direction:column;gap:6px;margin-bottom:4px}
.batch-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--r3);padding:10px 12px;display:grid;grid-template-columns:1fr auto;gap:4px;align-items:center}
.batch-no{font-size:12px;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--gold)}
.batch-dates{font-size:10px;color:var(--ink3);margin-top:2px;font-family:'JetBrains Mono',monospace}
.batch-qty{font-size:18px;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--ink);text-align:right}
.batch-qty-lbl{font-size:9px;color:var(--ink3);text-align:right;font-weight:600}
.no-batch{font-size:12px;color:var(--ink3);padding:6px 0;font-style:italic}
.inp-grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.field-sm label{font-size:9px;font-weight:800;color:var(--ink3);letter-spacing:.8px;text-transform:uppercase;display:block;margin-bottom:4px}
.field-sm input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r3);padding:8px 10px;font-size:13px;color:var(--ink);outline:none;font-family:'JetBrains Mono',monospace}
.field-sm input:focus{border-color:var(--gold)}
.batch-form{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r2);padding:12px;margin-bottom:8px}
.batch-form-title{font-size:10px;font-weight:800;color:var(--gold);letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px}
.txt-inp{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:10px 13px;font-size:13px;color:var(--ink);outline:none;transition:border-color .15s;margin-bottom:8px}
.txt-inp::placeholder{color:var(--ink3)}
.txt-inp:focus{border-color:var(--gold)}
.act-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.act-in{border:none;padding:13px;border-radius:var(--r2);font-size:13px;font-weight:800;background:var(--green);color:#000;transition:opacity .15s}
.act-out{border:none;padding:13px;border-radius:var(--r2);font-size:13px;font-weight:800;background:var(--red);color:#fff;transition:opacity .15s}
.act-in:active,.act-out:active{opacity:.75}

.alert-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
.alert-card.out{border-color:rgba(239,68,68,0.3)}
.alert-card.crit{border-color:rgba(249,115,22,0.3)}
.alert-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.alert-name{font-weight:800;font-size:14px;color:var(--ink)}
.alert-pack{font-size:11px;color:var(--ink3);margin-top:3px;font-family:'JetBrains Mono',monospace}
.alert-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.astat{background:var(--surface2);border-radius:var(--r2);padding:10px;text-align:center}
.astat-n{font-size:20px;font-weight:800;font-family:'JetBrains Mono',monospace;letter-spacing:-1px}
.astat-l{font-size:8px;color:var(--ink3);font-weight:800;letter-spacing:.8px;text-transform:uppercase;margin-top:4px}
.locs1{background:var(--surface2);border-radius:var(--r3);padding:8px 10px;font-size:12px;color:var(--ink3);display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.locs1 b{color:var(--ink);font-family:'JetBrains Mono',monospace}
.order-warn{background:var(--orange-bg);border:1px solid rgba(249,115,22,0.2);border-radius:var(--r3);padding:9px 12px;font-size:11px;color:var(--orange);font-weight:700}

.sync-bar{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:10px 14px;margin-bottom:12px}
.sync-led{width:7px;height:7px;border-radius:50%;background:var(--green);animation:blink 2.5s infinite;flex-shrink:0}
.sync-led.idle{background:var(--ink3);animation:none}
.sync-led.syncing{background:var(--gold);animation:blink .8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.sync-lbl{font-size:12px;font-weight:700;color:var(--ink2);flex:1}
.sync-time{font-size:10px;color:var(--ink3);font-family:'JetBrains Mono',monospace}

.inv-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden;transition:border-color .2s}
.inv-no{font-size:16px;font-weight:800;color:var(--ink);font-family:'JetBrains Mono',monospace;letter-spacing:-.5px}
.inv-dt{font-size:10px;color:var(--ink3);margin-top:2px;font-family:'JetBrains Mono',monospace}
.badge-sale{background:var(--red-bg);border:1px solid rgba(239,68,68,0.2);color:var(--red);font-size:9px;font-weight:800;padding:4px 10px;border-radius:20px}
.badge-pur{background:var(--green-bg);border:1px solid rgba(34,197,94,0.2);color:var(--green);font-size:9px;font-weight:800;padding:4px 10px;border-radius:20px}
.inv-route{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--surface2);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.inv-party{font-size:12px;font-weight:700;color:var(--ink)}
.inv-party-tag{font-size:9px;color:var(--ink3);margin-top:1px;font-weight:600;letter-spacing:.3px;text-transform:uppercase}
.inv-arrow{font-size:14px;color:var(--gold);flex:1;text-align:center}
.inv-lines{padding:8px 14px}
.inv-line{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)}
.inv-line:last-child{border-bottom:none}
.inv-ln{font-size:12px;font-weight:700;color:var(--ink)}
.inv-lm{font-size:10px;color:var(--ink3);margin-top:2px;font-family:'JetBrains Mono',monospace}
.inv-lr{text-align:right;flex-shrink:0}
.inv-qty{font-size:16px;font-weight:800;font-family:'JetBrains Mono',monospace}
.inv-batch{font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--gold);margin-top:2px;font-weight:600}
.qty-out{color:var(--red)}
.qty-in{color:var(--green)}

.log-item{display:flex;align-items:center;gap:11px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:12px 13px;margin-bottom:7px}
.log-ic{width:36px;height:36px;border-radius:var(--r2);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.log-ic.in{background:var(--green-bg)}
.log-ic.out{background:var(--red-bg)}
.log-ic.auto{background:var(--blue-bg)}
.log-body{flex:1;min-width:0}
.log-prod{font-size:12px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.log-meta{font-size:10px;color:var(--ink3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.log-right{text-align:right;flex-shrink:0}
.log-delta{font-size:16px;font-weight:800;font-family:'JetBrains Mono',monospace}
.log-stock{font-size:10px;color:var(--ink3);margin-top:2px;font-family:'JetBrains Mono',monospace}

.settings-note{background:var(--yellow-bg);border:1px solid rgba(234,179,8,0.2);border-radius:var(--r2);padding:12px 14px;font-size:12px;color:var(--yellow);font-weight:600;margin-bottom:12px;line-height:1.6}
.rl-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:13px 14px;display:flex;align-items:center;gap:10px;margin-bottom:7px}
.rl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.rl-body{flex:1;min-width:0}
.rl-name{font-size:13px;font-weight:700;color:var(--ink)}
.rl-meta{font-size:10px;color:var(--ink3);margin-top:2px;font-family:'JetBrains Mono',monospace}
.rl-edit-btn{background:var(--surface2);border:none;border-radius:var(--r3);padding:6px 12px;font-size:11px;font-weight:700;color:var(--ink2);flex-shrink:0}
.rl-edit-row{display:flex;gap:6px;align-items:center;flex-shrink:0}
.rl-inp{width:80px;background:var(--surface2);border:1px solid var(--gold);border-radius:var(--r3);padding:6px 8px;font-size:14px;font-weight:800;text-align:center;color:var(--ink);outline:none;font-family:'JetBrains Mono',monospace}
.rl-save{background:var(--gold);border:none;border-radius:var(--r3);padding:7px 12px;font-size:11px;font-weight:800;color:#000}
.rl-cancel{background:var(--surface2);border:none;border-radius:var(--r3);padding:7px 8px;font-size:11px;color:var(--ink3)}

.empty{text-align:center;padding:60px 20px;color:var(--ink3)}
.empty .ei{font-size:48px;margin-bottom:14px}
.empty .et{font-size:16px;font-weight:800;color:var(--ink);margin-bottom:6px}
.empty .es{font-size:13px;line-height:1.6}
.refresh-btn{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;border:none;padding:12px 24px;border-radius:var(--r2);font-size:13px;font-weight:800;margin-top:16px}

#toast{position:fixed;bottom:85px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--surface3);color:var(--ink);border:1px solid var(--border2);padding:11px 18px;border-radius:12px;font-size:12px;font-weight:700;z-index:999;white-space:nowrap;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;max-width:88vw;overflow:hidden;text-overflow:ellipsis;box-shadow:0 8px 32px rgba(0,0,0,.5)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

#fab{position:fixed;bottom:76px;right:16px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;font-size:28px;border:none;box-shadow:0 4px 20px rgba(212,168,67,0.4);display:flex;align-items:center;justify-content:center;z-index:60;transition:transform .15s}
#fab:active{transform:scale(.9)}

#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px)}
#modal-overlay.open{display:flex}
#modal{background:var(--surface);border-radius:20px 20px 0 0;padding:20px 18px 36px;width:100%;max-width:480px;max-height:90dvh;overflow-y:auto;border-top:1px solid var(--border2)}
.modal-handle{width:36px;height:4px;background:var(--surface3);border-radius:2px;margin:0 auto 20px}
.modal-title{font-size:18px;font-weight:800;color:var(--ink);margin-bottom:18px}
.field{margin-bottom:13px}
.field label{font-size:10px;font-weight:800;color:var(--ink3);letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:6px}
.field input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r2);padding:11px 13px;font-size:14px;color:var(--ink);outline:none;transition:border-color .15s}
.field input::placeholder{color:var(--ink3)}
.field input:focus{border-color:var(--gold)}
.modal-save{width:100%;border:none;padding:15px;border-radius:var(--r2);font-size:15px;font-weight:800;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;margin-top:6px}
.modal-cancel{width:100%;border:none;padding:12px;border-radius:var(--r2);font-size:14px;font-weight:700;background:var(--surface2);color:var(--ink3);margin-top:8px}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .2s ease-out both}
</style>
</head>
<body>

<div id="app">
  <div id="header">
    <div id="top-row">
      <div id="logo">
        <div id="logo-mark">🧴</div>
        <div id="logo-text">
          <div class="brand">YUMEDICS</div>
          <div class="sub">Command Center</div>
        </div>
      </div>
      <div id="header-meta">
        <span id="urgent-pill" class="urgent-pill"></span>
        <button id="export-btn" onclick="exportToExcel()" title="Sync & Download Excel"><span>📊</span><span>EXPORT</span></button>
        <span id="date-chip"></span>
      </div>
    </div>
    <div id="tabs">
      <button class="tab active" data-tab="stock"    onclick="switchTab('stock')">Stock</button>
      <button class="tab"        data-tab="alerts"   onclick="switchTab('alerts')">Alerts <span class="tab-ct" id="tc-al">0</span></button>
      <button class="tab"        data-tab="invoices" onclick="switchTab('invoices')">Dispatch <span class="tab-ct" id="tc-inv">0</span></button>
      <button class="tab"        data-tab="log"      onclick="switchTab('log')">Log</button>
      <button class="tab"        data-tab="settings" onclick="switchTab('settings')">Reorder</button>
    </div>
  </div>

  <div id="content"></div>

const SK = 'ymd_v9_final', IK = 'ymd_inv_v4';
const loadS = () => { try { const r = localStorage.getItem(SK); if (r) return JSON.parse(r); } catch(e){} return {products:JSON.parse(JSON.stringify(DEFAULTS)), log:[]}; };

S.products.forEach(p => {

// ══════════════════════════════════════════
//  UI STATE
// ══════════════════════════════════════════
let tab = 'stock', expId = null, srch = '', filt = 'all',
    editRL = null, lastSync = null, syncing = false,
    openInvIdx = null, invSrch = '', exporting = false;

// ══════════════════════════════════════════
//  PURE HELPERS
// ══════════════════════════════════════════
const status   = (t, r) => t === 0 ? 'out' : t <= r * .5 ? 'crit' : t <= r ? 'low' : 'ok';
const sLabel   = s => ({ok:'OK', low:'LOW', crit:'CRITICAL', out:'OUT OF STOCK'})[s];
const sColor   = s => ({ok:'var(--green)', low:'var(--yellow)', crit:'var(--orange)', out:'var(--red)'})[s];
const pct      = (t, r) => Math.min(100, Math.round(t / Math.max(r * 1.5, 1) * 100));
const enrich   = p => { const t = p.stock||0; const st = status(t, p.r); return {...p, total:t, st, pct:pct(t,p.r)}; };
const fmt      = n => Number(n||0).toLocaleString('en-IN');
const fmtDt    = ts => ts ? new Date(ts).toLocaleString('en-IN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : '—';
const parseExp = s => { if (!s) return null; const p = String(s).split('/'); return p.length===2 ? new Date(parseInt(p[1]), parseInt(p[0])-1, 1) : null; };
const daysLeft = s => { const d = parseExp(s); return d ? Math.round((d - new Date()) / 864e5) : null; };
const fefo     = arr => [...arr].sort((a,b) => { const da=parseExp(a.exp),db=parseExp(b.exp); return (!da&&!db)?0:!da?1:!db?-1:da-db; });

let _tt;
const toast = (msg, type='ok') => {
  const el = document.getElementById('toast');
  el.textContent = ({error:'🚨 ',warn:'⚠️ ',info:'🔄 ',ok:'✅ '}[type]||'✅ ') + msg;
  el.classList.add('show'); clearTimeout(_tt);
  _tt = setTimeout(() => el.classList.remove('show'), 3000);
};

// ══════════════════════════════════════════
//  NAME MATCHING — fuzzy match sheet rows → DEFAULTS
//  Strategy (in order):
//    1. Exact name + exact size match
//    2. Exact name + any size (for size variations)
//    3. Sheet name contains DEFAULT name (partial)
//    4. DEFAULT name contains sheet name (partial)
// ══════════════════════════════════════════
const norm = s => String(s||'').toUpperCase()
  .replace(/\s+/g,' ')
  .replace(/[^A-Z0-9\s]/g,'')   // strip special chars
  .trim();

function findProductByNameSize(sheetName, sheetSize) {
  const n  = norm(sheetName);
  const sz = norm(sheetSize);

  // 1. Exact name + exact size
  let p = S.products.find(x => norm(x.name) === n && norm(x.pack) === sz);
  if (p) return p;

  // 2. Exact name, any size (handles size typos)
  p = S.products.find(x => norm(x.name) === n);
  if (p) return p;

  // 3. Sheet name is substring of DEFAULT name OR vice versa, PLUS size match
  p = S.products.find(x => {
    const xn = norm(x.name);
    const nameMatch = xn.includes(n) || n.includes(xn);
    const sizeMatch = !sz || norm(x.pack) === sz || norm(x.pack).includes(sz) || sz.includes(norm(x.pack));
    return nameMatch && sizeMatch;
  });
  if (p) return p;

  // 4. Name partial match only (last resort — no size constraint)
  p = S.products.find(x => {
    const xn = norm(x.name);
    return xn.includes(n) || n.includes(xn);
  });
  return p || null;
}

// ══════════════════════════════════════════
//  FETCH LIVE DATA FROM APPS SCRIPT
// ══════════════════════════════════════════
async function fetchLiveData() {
  const res = await fetch(WEB_APP_URL, { method:'GET', redirect:'follow' });
  if (!res.ok) throw new Error(`HTTP ${res.status} from Apps Script`);
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}

function mergeProducts(rows) {
  if (!rows?.length) return;

  console.log(`[Yumedics] Merging ${rows.length} products from Google Sheets...`);

  rows.forEach(row => {
    const name  = String(row["Product"] || row.Product || '').trim();
    const size  = String(row["Size"]    || row.Size    || '').trim();
    const stock = parseInt(row["Current Stock"]  ?? row.current_stock  ?? 0) || 0;
    const reord = parseInt(row["Reorder Level"]  ?? row.reorder_level  ?? 0) || 0;

    if (!name) return; // skip blank rows

    const existing = findProductByNameSize(name, size);

    if (existing) {
      // ✅ Match found — only update stock + reorder, NEVER overwrite name/pack
      console.log(`[Yumedics] ✅ Matched: "${name} ${size}" → "${existing.name} ${existing.pack}" | stock: ${stock}`);
      existing.stock = stock;
      existing.r     = reord;
    } else {
      // ⚠️ No match in DEFAULTS — add as new product using SHEET values
      console.warn(`[Yumedics] ⚠️ No match for: "${name} ${size}" — adding as new product`);
      const maxId = S.products.reduce((a,x) => Math.max(a, x.id), 0);
      S.products.push({
        id:      maxId + 1,
        name:    name.toUpperCase(),
        pack:    size.toUpperCase() || '—',
        stock,
        r:       reord,
        batches: [],
      });
    }
  });

  console.log(`[Yumedics] Merge complete. Total products: ${S.products.length}`);
}

function mergeInvoices(rows) {
  if (!rows?.length) return;
  const sheetNos = new Set(rows.map(i => i.invoice_no));
  const localOnly = INV.filter(i => !sheetNos.has(i.invoice_no));
  INV = [...rows, ...localOnly];
  if (INV.length > 500) INV = INV.slice(0, 500);
}

async function syncFromSheet() {
  if (syncing) return;
  syncing = true;
  updateSyncBar('syncing');
  toast('Syncing from Google Sheets…', 'info');
  try {
    const live = await fetchLiveData();
    mergeProducts(live.products);
    mergeInvoices(live.invoices);
    saveS(); saveI();
    lastSync = new Date();
    updateSyncBar('live');
    toast(`✅ Synced — ${live.invoices?.length ?? 0} invoices · ${live.products?.length ?? 0} products`);
    render();
  } catch (err) {
    console.error('Sync error:', err);
    updateSyncBar('idle');
    toast('Sync failed — using local data: ' + (err.message || ''), 'warn');
  } finally {
    syncing = false;
  }
}

function updateSyncBar(state) {
  const led = document.getElementById('sync-led'),
        lbl = document.getElementById('sync-lbl'),
        time = document.getElementById('sync-time');

  led.className   = 'sync-led' + (state==='idle'?' idle':state==='syncing'?' syncing':'');
  lbl.textContent  = {syncing:'Syncing…', live:'Live — Google Sheets', idle:'Local data only'}[state];
  time.textContent = lastSync ? fmtDt(lastSync) : 'Never synced';
}

setInterval(syncFromSheet, 5 * 60 * 1000);

// ══════════════════════════════════════════
//  EXCEL EXPORT
// ══════════════════════════════════════════
async function exportToExcel() {
  if (exporting) return;

    mergeInvoices(live.invoices);

    }));
    const ws1 = XLSX.utils.json_to_sheet(stockRows);
    ws1['!cols'] = [{wch:10},{wch:38},{wch:14},{wch:14},{wch:14},{wch:12},{wch:14},{wch:14},{wch:60}];
    XLSX.utils.book_append_sheet(wb, ws1, 'Stock');

    const invoiceRows = [];
    INV.forEach(inv => {
      const lines = inv.products || [];
      if (!lines.length) {
        invoiceRows.push({
          'Invoice No': inv.invoice_no || '', 'Date': inv.invoice_date || '',
          'Type': inv.transaction_type || '', 'From': inv.from || '', 'To': inv.to || '',
          'Product': '', 'Size': '', 'Quantity': '', 'Batch No': '',
        });
      } else {
        const sign = inv.transaction_type === 'SALE' ? -1 : 1;
        lines.forEach(p => {
          invoiceRows.push({
            'Invoice No': inv.invoice_no || '', 'Date': inv.invoice_date || '',
            'Type': inv.transaction_type || '', 'From': inv.from || '', 'To': inv.to || '',
            'Product': p.name || '', 'Size': p.size || '',
            'Quantity': sign * (p.quantity || 0), 'Batch No': p.batch_no || '',
          });
        });
      }
    });
    const ws2 = invoiceRows.length
      ? XLSX.utils.json_to_sheet(invoiceRows)
      : XLSX.utils.aoa_to_sheet([['No invoices yet']]);
    ws2['!cols'] = [{wch:14},{wch:12},{wch:10},{wch:24},{wch:24},{wch:32},{wch:12},{wch:10},{wch:14}];
    XLSX.utils.book_append_sheet(wb, ws2, 'Invoices');

    const logRows = (S.log||[]).map(e => ({
      'Date / Time': new Date(e.ts).toLocaleString('en-IN'),
      'Product':     e.product || '',
      'Change':      e.change || '',
      'New Stock':   e.newQty ?? '',
      'Source':      e.auto ? 'Auto (Invoice)' : 'Manual',
      'Note':        e.note || '',
    }));
    const ws3 = logRows.length
      ? XLSX.utils.json_to_sheet(logRows)
      : XLSX.utils.aoa_to_sheet([['No activity logged yet']]);
    ws3['!cols'] = [{wch:20},{wch:36},{wch:10},{wch:12},{wch:18},{wch:50}];
    XLSX.utils.book_append_sheet(wb, ws3, 'Activity Log');

    const info = XLSX.utils.aoa_to_sheet([
      ['Yumedics Stock Export'],
      ['Generated At',  new Date().toLocaleString('en-IN')],
      ['Source',        'Google Sheets (via Apps Script)'],
      ['Products',      stockRows.length],
      ['Invoice lines', invoiceRows.length],
      ['Log entries',   logRows.length],
    ]);
    info['!cols'] = [{wch:20},{wch:40}];
    XLSX.utils.book_append_sheet(wb, info, 'Export Info');

    XLSX.writeFile(wb, `Yumedics_Export_${today}.xlsx`);
    toast(`✅ Live export: ${stockRows.length} products · ${invoiceRows.length} lines · ${logRows.length} log`);
    render();
  } catch (err) {
    console.error('Export error:', err);
    toast('Export failed: ' + (err.message || 'unknown error'), 'error');
  } finally {
    exporting = false;
    btn.classList.remove('busy');
    btn.disabled = false;
    btn.innerHTML = '<span>📊</span><span>EXPORT</span>';
  }
}

// ══════════════════════════════════════════
//  MANUAL STOCK UPDATE (local only — auto-overridden by next sync)
// ══════════════════════════════════════════
function doUpdate(id, type) {
  const g    = k => document.getElementById(`${k}-${id}`)?.value.trim();
  const qty  = parseInt(g('qty-inp'));
  if (!qty || qty <= 0) { toast('Enter a valid quantity', 'error'); return; }

  const p = S.products.find(x => x.id === id); if (!p) return;
  if (!p.batches) p.batches = [];

  const batchNo = g('batch-no-inp'), mfgDate = g('mfg-inp'), expDate = g('exp-inp');
  const party   = g('party-inp'),    note    = g('note-inp');
  const delta   = type === 'in' ? qty : -qty;
  p.stock = Math.max(0, (p.stock||0) + delta);

  if (type === 'in' && batchNo) {
    const ex = p.batches.find(b => b.batch_no === batchNo);
    if (ex) ex.qty = (ex.qty||0) + qty;
    else p.batches.push({batch_no:batchNo, mfg:mfgDate||'', exp:expDate||'', qty});
  } else if (type === 'out') {
    let rem = qty;
    fefo(p.batches).forEach(b => { if (!rem) return; const d = Math.min(b.qty||0, rem); b.qty = (b.qty||0)-d; rem -= d; });
    p.batches = p.batches.filter(b => (b.qty||0) > 0);
  }

  S.log.unshift({
    id: Date.now(), pid: id,
    product: p.name + (p.pack !== '—' ? ` · ${p.pack}` : ''),
    change:  (delta > 0 ? '+' : '') + delta, newQty: p.stock,
    note: (party ? `${type==='in'?'From':'To'}: ${party} · ` : '') + (note||(type==='in'?'Stock in':'Stock out')) + (batchNo?` · Batch ${batchNo}`:''),
    ts: Date.now(), auto: false,
  });
  if (S.log.length > 500) S.log = S.log.slice(0, 500);
  saveS(); expId = null;
  toast(`${p.name}: ${fmt(p.stock)} units (local)`);
  render();
}

function saveRL(id) {
  const v = parseInt(document.getElementById(`rl-inp-${id}`)?.value);
  if (isNaN(v) || v < 0) { toast('Invalid', 'error'); return; }
  S.products.find(x => x.id === id).r = v;
  saveS(); editRL = null; toast('Saved (local)'); render();
}

function saveNewProd() {
  const name = document.getElementById('m-name').value.trim().toUpperCase();
  if (!name) { toast('Name required', 'error'); return; }
  S.products.push({
    id: S.products.reduce((a,x)=>Math.max(a,x.id),0)+1,
    name,
    pack: document.getElementById('m-pack').value.trim() || '—',
    stock: parseInt(document.getElementById('m-b').value) || 0,
    r: parseInt(document.getElementById('m-r').value) || 300,
    batches: [],
  });
  saveS(); closeMo(); toast('Product added (local)'); render();
}

function switchTab(t) {

  updateHeader();

const renderSyncBar = () => `<div class="sync-bar">
  <div class="sync-led${lastSync?'':' idle'}" id="sync-led"></div>
  <div class="sync-lbl" id="sync-lbl">${lastSync?'Live — Google Sheets':'Local data (tap to sync)'}</div>
  <div class="sync-time" id="sync-time">${lastSync?fmtDt(lastSync):'Never'}</div>
  <button onclick="syncFromSheet()" style="border:none;background:var(--gold-bg);color:var(--gold);border-radius:8px;padding:4px 10px;font-size:10px;font-weight:800;margin-left:4px">SYNC</button>
</div>`;

function renderStock() {
  const en   = S.products.map(enrich);
  let list   = filt!=='all' ? en.filter(p=>p.st===filt) : [...en];
  if (srch.trim()) { const q=srch.toLowerCase(); list=list.filter(p=>p.name.toLowerCase().includes(q)||p.pack.toLowerCase().includes(q)); }

  const ok=en.filter(p=>p.st==='ok').length, low=en.filter(p=>p.st==='low').length, urg=en.filter(p=>p.st==='crit'||p.st==='out').length;

  const cards = list.map(p => {
    const isOpen = expId===p.id;
    let exp = '';
    if (isOpen) {
      const bHTML = !(p.batches?.length)
        ? `<div class="no-batch">No batch data yet.</div>`
        : fefo(p.batches).map(b => {
            const d=daysLeft(b.exp), rc=d!==null&&d<0?'expired':d!==null&&d<=90?'expiring':'';
            return `<div class="batch-row ${rc}"><div><div class="batch-no">${b.batch_no}</div><div class="batch-dates">MFG: ${b.mfg||'—'} · EXP: ${b.exp||'—'}</div></div><div><div class="batch-qty">${fmt(b.qty)}</div><div class="batch-qty-lbl">UNITS</div></div></div>`;
          }).join('');
      exp = `<div class="pexpand fade-up">
        <div class="sec-label">📦 Batch Stock</div>
        <div class="batch-list">${bHTML}</div>
        <div class="sec-label">🏷️ Stock In — Batch Details</div>
        <div class="batch-form"><div class="batch-form-title">New Batch</div>
          <div class="inp-grid2">
            <div class="field-sm"><label>Batch No.</label><input id="batch-no-inp-${p.id}" placeholder="e.g. AL0663"/></div>
            <div class="field-sm"><label>Qty</label><input id="qty-inp-${p.id}" type="number" min="1" placeholder="0" style="padding:8px;font-size:14px"/></div>
          </div>
          <div class="inp-grid2" style="margin-top:8px">
            <div class="field-sm"><label>Mfg Date</label><input id="mfg-inp-${p.id}" placeholder="MM/YYYY"/></div>
            <div class="field-sm"><label>Exp Date</label><input id="exp-inp-${p.id}" placeholder="MM/YYYY"/></div>
          </div>
        </div>
        <div class="sec-label">🏢 Party</div>
        <input class="txt-inp" id="party-inp-${p.id}" placeholder="Distributor / Chemist name"/>
        <input class="txt-inp" id="note-inp-${p.id}" placeholder="Note (optional)"/>
        <div class="act-row">
          <button class="act-in"  onclick="doUpdate(${p.id},'in')">📥 Stock In</button>
          <button class="act-out" onclick="doUpdate(${p.id},'out')">📤 Dispatch</button>
        </div>
      </div>`;
    }
    const fb=p.batches?.[0], bprev=fb?` · 🏷️ ${fb.batch_no}`:'';
    return `<div class="pcard ${p.st}${isOpen?' open':''}">
      <div class="prow" onclick="toggleExp(${p.id})">
        <div class="pdot"></div>
        <div class="pinfo"><div class="pname">${p.name}</div><div class="psub">${p.pack!=='—'?p.pack+' · ':''}${fmt(p.stock)} units${bprev}</div></div>
        <div class="pright"><div class="ptotal">${fmt(p.total)}</div><span class="spill">${sLabel(p.st)}</span></div>
        <div class="pchev">▾</div>
      </div>
      <div class="pbar"><div class="pbar-fill" style="width:${p.pct}%;background:${sColor(p.st)}"></div></div>
      ${exp}
    </div>`;
  }).join('');

  const chips = ['all','out','crit','low','ok'].map(k=>
    `<button class="chip${filt===k?' on':''}" onclick="setFilt('${k}')">${{all:'All',out:'Out',crit:'Critical',low:'Low',ok:'Healthy'}[k]}</button>`
  ).join('');

  return `${renderSyncBar()}
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-val" style="color:var(--green)">${ok}</div><div class="stat-lbl">Healthy</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--yellow)">${low}</div><div class="stat-lbl">Low</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--red)">${urg}</div><div class="stat-lbl">Urgent</div></div>
  </div>
  <div class="search-wrap">
    <span class="s-icon">🔍</span>
    <input class="search-inp" placeholder="Search product…" value="${srch.replace(/"/g,'&quot;')}" oninput="setSrch(this.value)"/>
    ${srch?`<button class="clear-x" onclick="setSrch('')">✕</button>`:''}
  </div>
  <div class="chips">${chips}</div>
  ${cards||`<div class="empty"><div class="ei">🔍</div><div class="et">Nothing found</div></div>`}`;
}

function renderAlerts() {
  const alerts = S.products.map(enrich).filter(p=>p.st!=='ok').sort((a,b)=>({out:0,crit:1,low:2}[a.st]-{out:0,crit:1,low:2}[b.st]||a.total-b.total));
  if (!alerts.length) return `<div class="empty"><div class="ei">🎉</div><div class="et">All Stock Healthy</div><div class="es">No reordering needed right now.</div></div>`;
  return `<div style="font-size:11px;color:var(--ink3);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:12px">${alerts.length} products need attention · Lead time ~1.5 months</div>`
    + alerts.map(p => {
        const def = Math.max(0,p.r-p.total);
        return `<div class="alert-card ${p.st}">
          <div class="alert-top"><div><div class="alert-name">${p.name}</div>${p.pack!=='—'?`<div class="alert-pack">${p.pack}</div>`:''}</div><span class="spill ${p.st}">${sLabel(p.st)}</span></div>
          <div class="alert-3">
            <div class="astat"><div class="astat-n" style="color:${sColor(p.st)}">${fmt(p.total)}</div><div class="astat-l">Current</div></div>
            <div class="astat"><div class="astat-n" style="color:var(--ink3)">${fmt(p.r)}</div><div class="astat-l">Reorder at</div></div>
            <div class="astat"><div class="astat-n" style="color:${def>0?'var(--red)':'var(--green)'}">${fmt(def)}</div><div class="astat-l">Shortfall</div></div>
          </div>
          <div class="locs1"><span>📦 Total Stock</span><b>${fmt(p.total)} units</b></div>
          ${p.batches?.length?`<div style="font-size:10px;color:var(--gold);margin-bottom:6px;font-family:'JetBrains Mono',monospace">🏷️ ${p.batches.map(b=>b.batch_no).join(' · ')}</div>`:''}
          ${def>0?`<div class="order-warn">⚠️ Order ${fmt(def)} units — 1.5 month lead time</div>`:''}
        </div>`;
      }).join('');
}

function renderInvoices() {
  if (!INV.length) return `<div class="empty"><div class="ei">📄</div><div class="et">No Dispatches Yet</div><div class="es">Invoices sync automatically from Google Sheets.</div><button class="refresh-btn" onclick="syncFromSheet()">🔄 Sync Now</button></div>`;

  let filtered = INV;
  if (invSrch.trim()) {
    const q = invSrch.toLowerCase();
    filtered = INV.filter(inv => ['invoice_no','from','to','invoice_date'].some(k=>String(inv[k]||'').toLowerCase().includes(q)));
  }

  let h = renderSyncBar();
  h += `<div class="search-wrap" style="margin-bottom:12px">
    <span class="s-icon">🔍</span>
    <input class="search-inp" placeholder="Search invoice number, party, or date…" value="${invSrch.replace(/"/g,'&quot;')}" oninput="setInvSrch(this.value)"/>
    ${invSrch?`<button class="clear-x" onclick="setInvSrch('')">✕</button>`:''}
  </div>`;
  h += `<div style="font-size:11px;color:var(--ink3);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:12px">${filtered.length} of ${INV.length} invoice${INV.length!==1?'s':''} · Tap to view details</div>`;

  if (!filtered.length) { h += `<div class="empty"><div class="ei">🔍</div><div class="et">No invoices found</div><div class="es">Try a different search term</div></div>`; return h; }

  h += filtered.map((inv, idx) => {
    const sale=inv.transaction_type==='SALE', isOpen=openInvIdx===idx, party=sale?(inv.to||'—'):(inv.from||'—');
    return `<div class="inv-card" style="${isOpen?'border-color:rgba(212,168,67,0.4)':''}">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 14px 10px;cursor:pointer;user-select:none" onclick="toggleInv(${idx})">
        <div style="display:flex;align-items:center;gap:10px;flex:1;min-width:0">
          <span style="font-size:16px">📄</span>
          <div style="flex:1;min-width:0"><div class="inv-no">${inv.invoice_no}</div><div class="inv-dt">${inv.invoice_date} · ${party}</div></div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
          <span class="${sale?'badge-sale':'badge-pur'}">${inv.transaction_type}</span>
          <span style="font-size:10px;color:var(--ink3);display:inline-block;transform:${isOpen?'rotate(180deg)':'rotate(0deg)'};transition:transform .2s">▼</span>
        </div>
      </div>
      ${isOpen?`
      <div class="inv-route">
        <div><div class="inv-party">${inv.from||'—'}</div><div class="inv-party-tag">FROM</div></div>
        <div class="inv-arrow">———▶</div>
        <div style="text-align:right"><div class="inv-party">${inv.to||'—'}</div><div class="inv-party-tag" style="text-align:right">TO</div></div>
      </div>
      <div class="inv-lines">${(inv.products||[]).map(p=>`<div class="inv-line">
        <div><div class="inv-ln">${p.name}</div><div class="inv-lm">${p.size||''}</div></div>
        <div class="inv-lr"><div class="inv-qty ${sale?'qty-out':'qty-in'}">${sale?'−':'+'}${p.quantity}</div><div class="inv-batch">🏷️ ${p.batch_no||'—'}</div></div>
      </div>`).join('')}</div>`:''}
    </div>`;
  }).join('');
  return h;
}

function renderLog() {
  if (!S.log.length) return `<div class="empty"><div class="ei">📋</div><div class="et">No Activity</div><div class="es">All stock movements will appear here.</div></div>`;
  return `<div style="font-size:11px;color:var(--ink3);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:12px">${S.log.length} movements</div>`
    + S.log.slice(0,100).map(e => {
        const isIn=e.change.startsWith('+');
        return `<div class="log-item">
          <div class="log-ic ${e.auto?'auto':isIn?'in':'out'}">${e.auto?'🤖':isIn?'📥':'📤'}</div>
          <div class="log-body"><div class="log-prod">${e.product}</div><div class="log-meta">${fmtDt(e.ts)} · ${e.note||''}</div></div>
          <div class="log-right"><div class="log-delta" style="color:${isIn?'var(--green)':'var(--red)'}">${e.change}</div><div class="log-stock">→ ${fmt(e.newQty)}</div></div>
        </div>`;
      }).join('');
}

function renderSettings() {
  return `<div class="settings-note">⏱️ Lead time: 1.5 months. Reorder levels are local-only (won't sync to Google Sheets).</div>`
    + S.products.map(enrich).map(p => {
        const isEd=editRL===p.id;
        return `<div class="rl-row">
          <div class="rl-dot" style="background:${sColor(p.st)}"></div>
          <div class="rl-body"><div class="rl-name">${p.name}${p.pack!=='—'?` (${p.pack})`:''}</div><div class="rl-meta">Stock: ${fmt(p.total)} · Reorder: ${fmt(p.r)} · Batches: ${p.batches?.length||0}</div></div>
          ${isEd
            ?`<div class="rl-edit-row"><input class="rl-inp" id="rl-inp-${p.id}" type="number" value="${p.r}" min="0"/><button class="rl-save" onclick="saveRL(${p.id})">Save</button><button class="rl-cancel" onclick="cancelRL()">✕</button></div>`
            :`<button class="rl-edit-btn" onclick="startRL(${p.id})">Edit</button>`
          }
        </div>`;
      }).join('');
}

// ══════════════════════════════════════════
//  UI ACTIONS
// ══════════════════════════════════════════
const toggleExp  = id  => { expId      = expId===id   ? null : id;  render(); };
const toggleInv  = idx => { openInvIdx = openInvIdx===idx ? null : idx; render(); };
const setSrch    = v   => { srch       = v;   render(); };
const setInvSrch = v   => { invSrch    = v; openInvIdx=null; render(); };
const setFilt    = v   => { filt       = v;   render(); };
const cancelRL   = ()  => { editRL     = null; render(); };
const startRL    = id  => { editRL=id; render(); setTimeout(()=>{ const el=document.getElementById(`rl-inp-${id}`); if(el){el.focus();el.select();} },50); };

// ══════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════
switchTab('stock');
setTimeout(syncFromSheet, 800);
</script>
</body>
</html>
